name: PR CI build

concurrency:
  group: ci-${{ github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
    branches:
      - main
      - v[0-9]+
      - v[0-9]+.[0-9]+
      - cryostat-v[0-9]+.[0-9]+

jobs:

  spotless:
    if: ${{ github.repository_owner == 'cryostatio' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        submodules: true
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: 'temurin'
        java-version: 21
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: restore
    - run: mvn spotless:check
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: save

  spotbugs:
    if: ${{ github.repository_owner == 'cryostatio' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        submodules: true
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: 'temurin'
        java-version: 21
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: restore
    - run: mvn -Psnapshots clean compile spotbugs:check
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: save

  build:
    if: ${{ github.repository_owner == 'cryostatio' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        JVM_version:
          - '11'
          - '17'
          - '21'
          - '25'
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        submodules: true
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.JVM_version }}
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: restore
    - run: mvn -Dspotless.check.skip -Dspotbugs.skip -Psnapshots -B -U clean verify
      env:
        JAVA_PACKAGE_TYPE: jdk
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: save
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: cryostat-agent-${{ matrix.arch }}-jdk${{ matrix.JVM_version }}
        path: |
          target/*-shaded.jar
          target/test-classes/
        retention-days: 7

  integration-test:
    if: ${{ github.repository_owner == 'cryostatio' }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        JVM_version:
          - '11'
          - '17'
          - '21'
          - '25'
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        submodules: true
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: cryostat-agent-${{ matrix.arch }}-jdk${{ matrix.JVM_version }}
        path: target/
    - name: Locate downloaded artifact
      id: locate-jar
      run: |
        JAR_PATH=$(find target -name '*-shaded.jar' -type f | head -n 1)
        echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
        echo "Found artifact at: $JAR_PATH"
        ls -lh "$JAR_PATH"
    - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.JVM_version }}
        java-package: jre
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: restore
    - run: |
        mvn -Dspotless.check.skip \
            -Dspotbugs.skip \
            -DskipUnitTests=true \
            -Dcryostat.agent.shaded.jar=${{ steps.locate-jar.outputs.jar_path }} \
            -Psnapshots \
            -B \
            failsafe:integration-test \
            failsafe:verify
      env:
        JAVA_PACKAGE_TYPE: jre
    - uses: skjolber/maven-cache-github-action@c4a30022e05fa8a86dde82cd8c1e49420d4a45dd # v3.1.2
      with:
        step: save
